<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>書籍要約</title>
  <link rel="stylesheet" href="styles.css?v=7">
</head>
<body>
  <div class="container">
    <header>
      <div class="header-row">
        <h1>📚 書籍要約</h1>
        <span class="header-count" id="header-count"></span>
      </div>
    </header>

    <div class="mode-tabs">
      <button class="tab-btn active" id="tab-random" onclick="switchMode('random')">ランダム</button>
      <button class="tab-btn" id="tab-list" onclick="switchMode('list')">一覧</button>
      <button class="tab-btn" id="tab-quiz" onclick="switchMode('quiz')">クイズ</button>
    </div>

    <!-- ランダムモード -->
    <div id="mode-random">
      <div class="controls">
        <div class="random-row">
          <button class="btn btn-nav" id="btn-prev-top" onclick="goPrev()" style="visibility:hidden">◀ 前へ</button>
          <button class="btn btn-primary" onclick="showRandom()">ランダムで表示</button>
          <button class="btn btn-nav" id="btn-next-top" onclick="goNext()" style="visibility:hidden">次へ ▶</button>
        </div>
      </div>
      <div class="card" id="book-card">
        <div class="card-header">
          <span class="category" id="book-category"></span>
          <div class="card-meta">
            <span class="book-number" id="book-number"></span>
            <span class="year" id="book-year"></span>
          </div>
        </div>
        <h2 class="book-title" id="book-title"></h2>
        <p class="book-author" id="book-author"></p>
        <div class="divider"></div>
        <h3 class="section-label">概要</h3>
        <p class="summary" id="book-summary"></p>
        <h3 class="section-label">主なポイント</h3>
        <ul class="points" id="book-points"></ul>
        <h3 class="section-label">この本から学べること</h3>
        <p class="takeaway" id="book-takeaway"></p>
      </div>
      <div class="controls">
        <div class="random-row">
          <button class="btn btn-nav" id="btn-prev" onclick="goPrev()" style="visibility:hidden">◀ 前へ</button>
          <button class="btn btn-primary" onclick="showRandom()">ランダムで表示</button>
          <button class="btn btn-nav" id="btn-next" onclick="goNext()" style="visibility:hidden">次へ ▶</button>
        </div>
      </div>
    </div>

    <!-- 一覧モード -->
    <div id="mode-list" style="display:none">
      <div id="book-list"></div>
    </div>

    <!-- クイズモード -->
    <div id="mode-quiz" style="display:none">
      <div class="card">
        <p class="quiz-question" id="quiz-question"></p>
        <button class="btn btn-primary" id="quiz-reveal" onclick="revealAnswer()">解答を見る</button>
        <button class="btn btn-nav quiz-next" id="quiz-next" style="display:none" onclick="nextQuestion()">次の問題へ</button>
      </div>
    </div>
  </div>

  <script src="books.js?v=1"></script>
  <script src="app.js?v=5"></script>
</body>
</html>
